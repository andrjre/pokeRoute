<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poke Route</title>
</head>
<body>
    
    <select id="game">
        <option value="firered">Fire Red</option>
        <option value="leafgreen">Leaf Green</option>
    </select>

    <select id="routes">
        <option value="kanto-route-1-area">Route 1</option>
        <option value="kanto-route-2-area">Route 2</option>
        <option value="kanto-route-3-area">Route 3</option>
        <option value="kanto-route-4-area">Route 4</option>
        <option value="kanto-route-5-area">Route 5</option>
        <option value="kanto-route-6-area">Route 6</option>
        <option value="kanto-route-7-area">Route 7</option>
        <option value="kanto-route-8-area">Route 8</option>
        <option value="kanto-route-9-area">Route 9</option>
        <option value="kanto-route-10-area">Route 10</option>
        <option value="kanto-route-11-area">Route 11</option>
    </select>

    <script>

    function getEncounters() {
        const game = document.getElementById('game').value;
        const route = document.getElementById('routes').value;

        fetch(`https://pokeapi.co/api/v2/location-area/${route}`)
        .then(response => response.json())
        .then(data => {
           data.pokemon_encounters
            .filter(encounter =>
                encounter.version_details.some(v => v.version.name === game)
            )

            .forEach(encounter => {

                const versionData = encounter.version_details.find(v => v.version.name === game);
                let method = versionData.encounter_details[0].method;
                let maxChance = versionData.max_chance;
                let count = versionData.encounter_details;
                let size = count.length
                let name = encounter.pokemon.name
        

                if(size => 1){
                    let methodTotals = {};
                    for(let i = 0; i < size; i++){
                        let methodName = count[i].method.name;
                        let chance = count[i].chance;
                        methodTotals[methodName] = (methodTotals[methodName] || 0) + chance;
                    }
                    console.log(name, methodTotals);
                } else {
                    console.log("error");
                }

                console.log("next pokemon");
                

            }); 

        });
    }

    document.getElementById('game').addEventListener('change', getEncounters);
    document.getElementById('routes').addEventListener('change', getEncounters);

  getEncounters();

    </script>
    
</body>
</html>
